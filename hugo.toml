baseURL = "https://hivevm.org/"
languageCode = "en-us"
title = "HiveVM"
enableRobotsTXT = true

disableKinds = ["taxonomy", "term"]

[params]
  tagline = "Model-Driven Application Platform"
  description = "A cross-platform, model-driven application platform in Rust — describe your application as a model and HiveVM runs it, with tools to model parsers, manuals and projects for Java, C++ and Rust."
  github_org = "https://github.com/hivevm"
  # "Get started" routes visitors into NUC's template flow — a new project from the template.
  start_url = "https://github.com/hivevm/nuc/generate"

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    noClasses = false
    tabWidth = 2
    guessSyntax = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
