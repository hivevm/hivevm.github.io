---
layout: default
---
<article class="container page-wrap">
  <div class="prose-shell">
    {%- if page.title -%}
    <header class="post-head" data-reveal>
      {%- if page.eyebrow %}<p class="eyebrow">{{ page.eyebrow }}</p>{% endif -%}
      <h1>{{ page.title }}</h1>
    </header>
    {%- endif -%}
    <div class="prose">
      {{ content }}
    </div>
  </div>
</article>
