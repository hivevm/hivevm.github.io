---
layout: default
---
<article class="container page-wrap">
  <div class="prose-shell">
    <header class="post-head" data-reveal>
      <p class="eyebrow">Blog</p>
      <h1>{{ page.title }}</h1>
      <p class="post-meta">
        <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: '%B %-d, %Y' }}</time>
        {%- if page.author %} · {{ page.author }}{% endif -%}
      </p>
    </header>

    <div class="prose">
      {{ content }}
    </div>

    <hr style="border:0;border-top:1px solid var(--line);margin:3rem 0 1.5rem" />
    <a href="{{ '/blog/' | relative_url }}" class="back-link"><span aria-hidden="true">←</span> Back to the blog</a>
  </div>
</article>
