title: HiveVM
tagline: Development Tools based on Modelling
description: >-
  Developer tools based on modelling — an LL(k) parser generator, a CommonMark
  manual generator and a Gradle workflow engine for Java, C++ and Rust.

# For an organisation page served at the domain root (CNAME → hivevm.org)
url: "https://hivevm.org"
baseurl: ""

github_org: "https://github.com/hivevm"

# Build (these are the GitHub Pages defaults — listed for clarity)
markdown: kramdown
highlighter: rouge
permalink: /blog/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge

# Pretty blog URLs handled via permalink above
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
